services:
  caddy:
    image: caddy:2-alpine
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/srv:ro
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ice-api
      - peerjs

  ice-api:
    image: node:22-alpine
    working_dir: /app
    command: node server/ice-api.js
    env_file: .env
    volumes:
      - .:/app:ro

  peerjs:
    image: peerjs/peerjs-server
    command: --port 9000 --path /peer --proxied true --expire_timeout 5000 --alive_timeout 60000 --allow_discovery false

  coturn:
    image: coturn/coturn
    env_file: .env
    network_mode: host
    command: >
      --no-cli
      --fingerprint
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=${TURN_REALM}
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=49160
      --max-port=49200
      --no-multicast-peers
      --no-tlsv1
      --no-tlsv1_1
      --log-file=stdout

volumes:
  caddy_data:
  caddy_config:
