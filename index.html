<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2P File Tunnel</title>
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<style>
  *{box-sizing:border-box} body{margin:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}
  main{min-height:100vh;display:grid;place-items:center;padding:24px}
  .wrap{width:min(680px,100%)} .center{text-align:center}
  .code{font-size:clamp(46px,12vw,110px);font-weight:800;letter-spacing:.08em;line-height:1;margin:0 0 34px;user-select:all}
  .join{position:relative;margin:auto;width:min(440px,100%)}
  input{width:100%;height:58px;padding:0 62px 0 18px;background:#f5f5f5;border:0;border-radius:0;color:#111;font-size:18px;letter-spacing:.08em;text-transform:uppercase;outline:0}
  input:disabled{color:#999} button{border:0;background:transparent;color:#111;cursor:pointer;padding:0;display:inline-grid;place-items:center}
  .join button{position:absolute;right:0;top:0;width:58px;height:58px}
  svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:square;stroke-linejoin:miter}
  .spin{animation:r .8s linear infinite}@keyframes r{to{transform:rotate(360deg)}}
  .muted{color:#777;font-size:13px;margin-top:18px}.hidden{display:none!important}
  .tree{width:min(760px,100%);margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:34px}
  .bar strong{font-size:14px;font-weight:500;color:#555}.actions{display:flex;gap:18px;align-items:center}
  .drop{padding:26px;background:#fafafa;text-align:center;color:#666;margin-bottom:22px}
  .drop.on{background:#f0f0f0}.files{display:grid;gap:2px}.file{display:grid;grid-template-columns:28px 1fr auto;gap:12px;align-items:center;padding:12px 0}
  .file small{display:block;color:#888;margin-top:3px}.file a{text-decoration:none;color:#111;display:inline-grid;place-items:center}
  progress{width:100%;height:3px;border:0;margin-top:8px}.name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #pick{display:none}
</style>
</head>
<body>
<main>
  <section id="home" class="wrap center">
    <h1 id="code" class="code">------</h1>
    <div class="join">
      <input id="to" maxlength="6" placeholder="CÓDIGO" autocomplete="off" spellcheck="false">
      <button id="go" title="Ligar" aria-label="Ligar"></button>
    </div>
    <p id="status" class="muted"></p>
  </section>

  <section id="tree" class="tree hidden">
    <div class="bar">
      <strong id="state"></strong>
      <div class="actions">
        <button id="add" title="Inserir ficheiros" aria-label="Inserir ficheiros">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button id="close" title="Fechar" aria-label="Fechar">
          <svg viewBox="0 0 24 24"><path d="M7 7l10 10M17 7L7 17"/></svg>
        </button>
      </div>
    </div>
    <input id="pick" type="file" multiple>
    <div id="drop" class="drop">arrasta ficheiros para aqui</div>
    <div id="files" class="files"></div>
  </section>
</main>

<script>
const $=id=>document.getElementById(id), icon={
  ok:'<svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>',
  load:'<svg class="spin" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 1-9 9"/></svg>',
  file:'<svg viewBox="0 0 24 24"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5"/></svg>',
  down:'<svg viewBox="0 0 24 24"><path d="M12 4v13M7 12l5 5 5-5"/><path d="M5 21h14"/></svg>'
}
let peer,conn,n=0,buf={},meta={},me,them='outro dispositivo'
const code=$('code'),to=$('to'),home=$('home'),tree=$('tree'),files=$('files'),status=$('status'),state=$('state'),go=$('go')
const id=()=>Math.random().toString(36).slice(2,8).toUpperCase()
const name=()=>`${['Silver','Blue','Tiny','Fast','Quiet','Local','Fresh','Clean'][Math.random()*8|0]} ${['Fox','Panda','Falcon','Node','Pixel','Disk','Cloud','Link'][Math.random()*8|0]}`
const size=b=>b?`${(b/1024**(Math.floor(Math.log(b)/Math.log(1024)))).toFixed(1)} ${['B','KB','MB','GB'][Math.floor(Math.log(b)/Math.log(1024))]}`:'0 B'
const setBusy=x=>{to.disabled=x;go.innerHTML=x?icon.load:icon.ok}
const row=(name,sub='')=>{
  let e=document.createElement('div'); e.className='file'
  e.innerHTML=`${icon.file}<div class="name"><span>${name}</span><small>${sub}</small><progress max="100" value="0"></progress></div><div></div>`
  files.prepend(e); return {e,p:e.querySelector('progress'),s:e.querySelector('small'),a:e.lastChild}
}
const show=()=>{home.classList.add('hidden');tree.classList.remove('hidden');state.textContent=`${me} ⇄ ${them}`}
const hello=()=>conn?.open&&conn.send({t:'h',name:me})
const bind=c=>{
  conn=c; setBusy(true)
  conn.on('open',()=>{hello();show();setBusy(false)})
  conn.on('data',d=>{
    if(d.t==='h'){them=d.name||them; state.textContent=`${me} ⇄ ${them}`; hello(); return}
    if(d.t==='m'){meta[d.id]={...d,r:0,ui:row(d.name,size(d.size))};buf[d.id]=[]}
    if(d.t==='c'){let m=meta[d.id]; if(!m)return; buf[d.id][d.i]=d.b; m.r++; m.ui.p.value=m.r/m.ch*100; m.ui.s.textContent=Math.round(m.r/m.ch*100)+'%'}
    if(d.t==='d'){let m=meta[d.id],blob=new Blob(buf[d.id],{type:m.mime||'application/octet-stream'}),a=document.createElement('a')
      a.href=URL.createObjectURL(blob); a.download=m.name; a.innerHTML=icon.down; m.ui.a.append(a); m.ui.s.textContent='pronto para descarregar'; delete buf[d.id]; delete meta[d.id]}
  })
  conn.on('close',()=>location.reload())
  conn.on('error',()=>setBusy(false))
}
function boot(){
  me=name(); status.textContent=me; go.innerHTML=icon.ok
  peer=new Peer(id())
  peer.on('open',x=>code.textContent=x)
  peer.on('connection',bind)
  peer.on('error',e=>{status.textContent='erro: '+e.type;setBusy(false)})
}
async function send(f){
  if(!conn?.open)return
  let fid=Date.now()+'-'+n++,ch=64*1024,total=Math.ceil(f.size/ch),ui=row(f.name,size(f.size))
  conn.send({t:'m',id:fid,name:f.name,size:f.size,mime:f.type,ch:total})
  for(let i=0,o=0;o<f.size;i++,o+=ch){
    conn.send({t:'c',id:fid,i,b:await f.slice(o,o+ch).arrayBuffer()})
    ui.p.value=Math.min(100,(o+ch)/f.size*100); ui.s.textContent=Math.round(ui.p.value)+'%'
    while(conn.dataChannel?.bufferedAmount>8*1024*1024) await new Promise(r=>setTimeout(r,50))
  }
  conn.send({t:'d',id:fid}); ui.s.textContent='enviado'
}
function connect(){let v=to.value.trim(); if(v&&!to.disabled)bind(peer.connect(v))}
go.onclick=connect
to.onkeydown=e=>{if(e.key==='Enter')connect()}
to.oninput=()=>to.value=to.value.toUpperCase().replace(/[^A-Z0-9]/g,'')
$('add').onclick=()=>$('pick').click()
$('pick').onchange=e=>[...e.target.files].forEach(send)
$('close').onclick=()=>peer.destroy()
;['dragover','dragleave','drop'].forEach(x=>$('drop').addEventListener(x,e=>{e.preventDefault();$('drop').classList.toggle('on',x==='dragover'); if(x==='drop')[...e.dataTransfer.files].forEach(send)}))
boot()
</script>
</body>
</html>
